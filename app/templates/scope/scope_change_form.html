{% extends "base.html" %}
{% block title %}Nova Solicitação de Mudança — {{ project.name }}{% endblock %}
{% block content %}
<nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <a href="{{ url_for('projects.index') }}" class="hover:text-blue-600">Projetos</a>
    <span>/</span>
    <a href="{{ url_for('projects.detail', project_id=project.id) }}" class="hover:text-blue-600">{{ project.name }}</a>
    <span>/</span>
    <a href="{{ url_for('scope.scope_changes', project_id=project.id) }}" class="hover:text-blue-600">Mudanças de Escopo</a>
    <span>/</span>
    <span class="text-gray-800 font-medium">Nova</span>
</nav>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Nova Solicitação de Mudança de Escopo</h1>
    <form method="POST" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
            <input type="text" name="title" value="{{ scope_change.title if scope_change else '' }}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
            <textarea name="description" rows="3"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{ scope_change.description if scope_change else '' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Justificativa</label>
            <textarea name="reason" rows="2"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{ scope_change.reason if scope_change else '' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Impacto</label>
            <textarea name="impact" rows="2"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{{ scope_change.impact if scope_change else '' }}</textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm transition-colors">Criar</button>
            <a href="{{ url_for('scope.scope_changes', project_id=project.id) }}"
                class="px-4 py-2 border border-gray-300 text-gray-600 font-medium rounded-lg text-sm hover:bg-gray-50 transition-colors">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

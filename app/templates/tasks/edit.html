{% extends "base.html" %}
{% block title %}Editar Tarefa — Engineering Projects Manager{% endblock %}
{% block content %}
<!-- Breadcrumb -->
<nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <a href="{{ url_for('projects.index') }}" class="hover:text-blue-600 transition-colors">Projetos</a>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
    <a href="{{ url_for('tasks.index', project_id=task.project_id) }}" class="hover:text-blue-600 transition-colors">Tarefas</a>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
    <span class="text-gray-800 font-medium">Editar</span>
</nav>

<div class="max-w-xl">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Editar Tarefa</h1>
        <p class="text-sm text-gray-500 mt-1">Atualize as informações da tarefa</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="title">Título</label>
                <input id="title" type="text" name="title" value="{{ task.title }}" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="description">Descrição</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none">{{ task.description }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="status">Status</label>
                <select id="status" name="status"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                    <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>A Fazer</option>
                    <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>Em Progresso</option>
                    <option value="done" {% if task.status == 'done' %}selected{% endif %}>Concluído</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Prioridade</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="priority" value="low" class="sr-only peer" {% if task.priority == 'low' %}checked{% endif %}>
                        <div class="peer-checked:border-gray-500 peer-checked:bg-gray-50 border-2 border-gray-200 rounded-xl p-3 text-center transition-all hover:border-gray-300">
                            <span class="block text-lg mb-0.5">🟢</span>
                            <span class="text-xs font-medium text-gray-700">Baixa</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="priority" value="medium" class="sr-only peer" {% if task.priority == 'medium' %}checked{% endif %}>
                        <div class="peer-checked:border-yellow-500 peer-checked:bg-yellow-50 border-2 border-gray-200 rounded-xl p-3 text-center transition-all hover:border-gray-300">
                            <span class="block text-lg mb-0.5">🟡</span>
                            <span class="text-xs font-medium text-gray-700">Média</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="priority" value="high" class="sr-only peer" {% if task.priority == 'high' %}checked{% endif %}>
                        <div class="peer-checked:border-red-500 peer-checked:bg-red-50 border-2 border-gray-200 rounded-xl p-3 text-center transition-all hover:border-gray-300">
                            <span class="block text-lg mb-0.5">🔴</span>
                            <span class="text-xs font-medium text-gray-700">Alta</span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    Salvar Alterações
                </button>
                <a href="{{ url_for('tasks.index', project_id=task.project_id) }}"
                    class="px-4 py-2.5 border border-gray-300 hover:border-gray-400 text-gray-600 font-medium rounded-lg text-sm transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "pep/base.html" %}
{% block pep_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-6">
            {% if baseline_obj %}Editar Baseline{% else %}Novo Baseline{% endif %}
        </h2>
        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Baseline</label>
                    <input type="text" name="name" value="{{ baseline_obj.name if baseline_obj else 'Baseline v1' }}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Data do Baseline <span class="text-red-500">*</span></label>
                    <input type="date" name="baseline_date" required
                        value="{{ baseline_obj.baseline_date.strftime('%Y-%m-%d') if baseline_obj and baseline_obj.baseline_date else '' }}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Custo Total (R$)</label>
                        <input type="number" name="total_cost" step="0.01" min="0"
                            value="{{ baseline_obj.total_cost if baseline_obj and baseline_obj.total_cost else '' }}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Duração Total (dias)</label>
                        <input type="number" name="total_duration" min="1"
                            value="{{ baseline_obj.total_duration if baseline_obj and baseline_obj.total_duration else '' }}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{{ url_for('pep.baseline', project_id=project.id) }}"
                    class="px-4 py-2 border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-opacity-90 transition-colors">
                    {% if baseline_obj %}Salvar Alterações{% else %}Criar Baseline{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

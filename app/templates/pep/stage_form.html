{% extends "pep/base.html" %}
{% block pep_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-1">
            {% if stage %}Editar Etapa{% else %}Nova Etapa{% endif %}
        </h2>
        <p class="text-sm text-gray-500 mb-6">Fase: <span class="font-medium">{{ phase.name }}</span></p>
        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Etapa <span class="text-red-500">*</span></label>
                    <input type="text" name="name" value="{{ stage.name if stage else '' }}" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                    <textarea name="description" rows="2"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none">{{ stage.description if stage and stage.description else '' }}</textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Início</label>
                        <input type="date" name="start_date" value="{{ stage.start_date.strftime('%Y-%m-%d') if stage and stage.start_date else '' }}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Fim</label>
                        <input type="date" name="end_date" value="{{ stage.end_date.strftime('%Y-%m-%d') if stage and stage.end_date else '' }}"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                        <select name="status" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                            <option value="pending" {% if stage and stage.status == 'pending' %}selected{% endif %}>Pendente</option>
                            <option value="in_progress" {% if stage and stage.status == 'in_progress' %}selected{% endif %}>Em Progresso</option>
                            <option value="completed" {% if stage and stage.status == 'completed' %}selected{% endif %}>Concluída</option>
                            <option value="on_hold" {% if stage and stage.status == 'on_hold' %}selected{% endif %}>Em Espera</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Sequência</label>
                        <input type="number" name="sequence" value="{{ stage.sequence if stage else 0 }}" min="0"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{{ url_for('pep.eap', project_id=project.id) }}"
                    class="px-4 py-2 border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-opacity-90 transition-colors">
                    {% if stage %}Salvar Alterações{% else %}Criar Etapa{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

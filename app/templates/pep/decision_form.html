{% extends "pep/base.html" %}
{% block pep_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Registrar Decisão</h2>
        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Decisão <span class="text-red-500">*</span></label>
                    <textarea name="decision" rows="3" required
                        placeholder="Descreva a decisão tomada..."
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Justificativa</label>
                    <textarea name="justification" rows="2"
                        placeholder="Por que esta decisão foi tomada?"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Responsável pela Decisão</label>
                    <select name="owner_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                        <option value="">— Selecionar —</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.full_name or user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{{ url_for('pep.documentation', project_id=project.id) }}"
                    class="px-4 py-2 border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-opacity-90 transition-colors">
                    Registrar Decisão
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "pep/base.html" %}
{% block pep_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-6">
            {% if risk %}Editar Risco{% else %}Novo Risco{% endif %}
        </h2>
        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Descrição do Risco <span class="text-red-500">*</span></label>
                    <textarea name="description" rows="3" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none">{{ risk.description if risk else '' }}</textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Probabilidade (1-5)</label>
                        <select name="probability" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                            {% for v in range(1,6) %}
                            <option value="{{ v }}" {% if risk and risk.probability == v %}selected{% endif %}>{{ v }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Impacto (1-5)</label>
                        <select name="impact" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                            {% for v in range(1,6) %}
                            <option value="{{ v }}" {% if risk and risk.impact == v %}selected{% endif %}>{{ v }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                        <option value="identified" {% if risk and risk.status == 'identified' %}selected{% endif %}>Identificado</option>
                        <option value="mitigated" {% if risk and risk.status == 'mitigated' %}selected{% endif %}>Mitigado</option>
                        <option value="accepted" {% if risk and risk.status == 'accepted' %}selected{% endif %}>Aceito</option>
                        <option value="occurred" {% if risk and risk.status == 'occurred' %}selected{% endif %}>Ocorrido</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Plano de Mitigação</label>
                    <textarea name="mitigation_plan" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none">{{ risk.mitigation_plan if risk and risk.mitigation_plan else '' }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Responsável</label>
                    <select name="owner_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                        <option value="">— Selecionar —</option>
                        {% for user in users %}
                        <option value="{{ user.id }}" {% if risk and risk.owner_id == user.id %}selected{% endif %}>
                            {{ user.full_name or user.username }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{{ url_for('pep.risks', project_id=project.id) }}"
                    class="px-4 py-2 border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-opacity-90 transition-colors">
                    {% if risk %}Salvar Alterações{% else %}Cadastrar Risco{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "pep/base.html" %}
{% block pep_content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Nova Alocação de Recurso</h2>
        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Membro da Equipe <span class="text-red-500">*</span></label>
                    <select name="user_id" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                        <option value="">— Selecionar —</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.full_name or user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Atividade <span class="text-red-500">*</span></label>
                    <select name="activity_id" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                        <option value="">— Selecionar —</option>
                        {% for phase in phases %}
                        <optgroup label="{{ phase.name }}">
                            {% for stage in phase.stages.all() %}
                            {% for activity in stage.activities.all() %}
                            <option value="{{ activity.id }}">{{ stage.name }} › {{ activity.name }}</option>
                            {% endfor %}
                            {% endfor %}
                        </optgroup>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Horas Alocadas <span class="text-red-500">*</span></label>
                    <input type="number" name="allocated_hours" min="0.5" step="0.5" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Início</label>
                        <input type="date" name="start_date"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data Fim</label>
                        <input type="date" name="end_date"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
                <a href="{{ url_for('pep.resources', project_id=project.id) }}"
                    class="px-4 py-2 border border-gray-300 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium transition-colors">Cancelar</a>
                <button type="submit"
                    class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-opacity-90 transition-colors">
                    Criar Alocação
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Projects{% endblock %}
{% block content %}
<h1>My Projects</h1>
<a href="{{ url_for('projects.create') }}">New Project</a>
<ul>
{% for project in projects %}
    <li><a href="{{ url_for('projects.detail', project_id=project.id) }}">{{ project.name }}</a> - {{ project.status }}</li>
{% else %}
    <li>No projects yet.</li>
{% endfor %}
</ul>
{% endblock %}

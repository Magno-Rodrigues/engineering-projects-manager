{% extends "base.html" %}
{% block title %}Projetos{% endblock %}
{% block content %}
<h1>Meus Projetos</h1>
<a href="{{ url_for('projects.create') }}">Novo Projeto</a>
<ul>
{% for project in projects %}
    <li><a href="{{ url_for('projects.detail', project_id=project.id) }}">{{ project.name }}</a> - {{ project.status }}</li>
{% else %}
    <li>Nenhum projeto ainda.</li>
{% endfor %}
</ul>
{% endblock %}

<!-- Scenario Creation Modal -->
<div class="p-4">
    <h3 class="text-lg font-semibold text-gray-800 mb-4">Novo Cenário</h3>
    <form method="POST">
        <div class="space-y-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
                <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                <select name="scenario_type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="realistic">Realista</option>
                    <option value="optimistic">Otimista</option>
                    <option value="pessimistic">Pessimista</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Variação Orçamento (%)</label>
                <input type="number" name="budget_variance" value="0" step="0.1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Variação Cronograma (%)</label>
                <input type="number" name="schedule_variance" value="0" step="0.1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                <textarea name="description" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea>
            </div>
        </div>
        <div class="flex justify-end mt-4 gap-3">
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg">Criar</button>
        </div>
    </form>
</div>

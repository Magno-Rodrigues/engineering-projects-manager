<!-- Filter Modal -->
<div class="p-4">
    <h3 class="text-lg font-semibold text-gray-800 mb-4">Filtrar Transações</h3>
    <form method="GET">
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Data Início</label>
                    <input type="date" name="date_from" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Data Fim</label>
                    <input type="date" name="date_to" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                <select name="category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todas</option>
                    <option value="labor">Labor</option>
                    <option value="material">Material</option>
                    <option value="service">Service</option>
                    <option value="infrastructure">Infrastructure</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Centro de Custo</label>
                <select name="cost_center_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                    <option value="">Todos</option>
                </select>
            </div>
        </div>
        <div class="flex justify-end mt-4 gap-3">
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg">Filtrar</button>
        </div>
    </form>
</div>

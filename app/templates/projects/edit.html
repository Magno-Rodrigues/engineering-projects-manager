{% extends "base.html" %}
{% block title %}Edit {{ project.name }}{% endblock %}
{% block content %}
<h1>Edit Project</h1>
<form method="POST">
    <label>Nome: <input type="text" name="name" value="{{ project.name }}" required></label>
    <label>Descrição: <textarea name="description">{{ project.description }}</textarea></label>
    <label>Status:
        <select name="status">
            <option value="planning" {% if project.status == 'planning' %}selected{% endif %}>Planejamento</option>
            <option value="in_progress" {% if project.status == 'in_progress' %}selected{% endif %}>Em Progresso</option>
            <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completo</option>
            <option value="on_hold" {% if project.status == 'on_hold' %}selected{% endif %}>Em espera</option>
            <option value="cancelled" {% if project.status == 'cancelled' %}selected{% endif %}>Cancelado</option>
        </select>
    </label>
    <button type="submit">Salvar</button>
</form>
{% endblock %}

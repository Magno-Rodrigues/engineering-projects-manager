{% extends "base.html" %}
{% block title %}Nova Baseline de Custo — {{ project.name }}{% endblock %}
{% block content %}
<nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <a href="{{ url_for('projects.index') }}" class="hover:text-blue-600">Projetos</a>
    <span>/</span>
    <a href="{{ url_for('projects.detail', project_id=project.id) }}" class="hover:text-blue-600">{{ project.name }}</a>
    <span>/</span>
    <a href="{{ url_for('cost.index', project_id=project.id) }}" class="hover:text-blue-600">Custo</a>
    <span>/</span>
    <span class="text-gray-800 font-medium">Nova Baseline</span>
</nav>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Nova Baseline de Custo</h1>
    <form method="POST" class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
            <input type="text" name="name"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
            <textarea name="description" rows="2"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Orçamento Total (R$) *</label>
            <input type="number" step="0.01" min="0.01" name="total_budget"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm transition-colors">Criar</button>
            <a href="{{ url_for('cost.index', project_id=project.id) }}"
                class="px-4 py-2 border border-gray-300 text-gray-600 font-medium rounded-lg text-sm hover:bg-gray-50 transition-colors">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Redefinir Senha — Engineering Projects Manager{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <div class="mb-6 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-blue-50 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Definir Senha</h1>
            <p class="text-gray-500 text-sm mt-1">Escolha uma senha segura para acessar o sistema.</p>
        </div>

        <form method="post" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nova Senha *</label>
                <input type="password" name="password" required autofocus
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Mínimo 6 caracteres">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha *</label>
                <input type="password" name="confirm_password" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Repita a senha">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm py-2.5 rounded-lg transition-colors">
                Salvar Senha
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-5">
            Este link expira em 12 horas após o envio do email.
        </p>
    </div>
</div>
{% endblock %}

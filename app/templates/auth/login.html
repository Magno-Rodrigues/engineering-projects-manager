{% extends "base.html" %}
{% block title %}Login — CMRDA Engineering Management{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-16rem)] flex items-center justify-center py-8">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <!-- CMRDA Logo -->
                <div class="flex justify-center mb-4">
                    <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
                        <rect width="72" height="72" rx="16" fill="#1A3A52"/>
                        <g transform="translate(10,14)">
                            <rect x="0" y="24" width="10" height="20" rx="2" fill="#C9A961"/>
                            <rect x="14" y="15" width="10" height="29" rx="2" fill="#C9A961"/>
                            <rect x="28" y="5" width="10" height="39" rx="2" fill="#C9A961"/>
                            <polyline points="5,26 19,17 33,7 50,2" stroke="#C9A961" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            <polygon points="50,2 41,6 44,13" fill="#C9A961"/>
                        </g>
                    </svg>
                </div>
                <div class="mb-1">
                    <span class="text-3xl font-black tracking-tight" style="color:#1A3A52">CMRDA</span>
                </div>
                <div class="mb-5">
                    <span class="text-xs font-semibold tracking-widest uppercase" style="color:#C9A961">Engineering Management</span>
                </div>
                <h1 class="text-xl font-bold text-gray-900">Bem-vindo de volta</h1>
                <p class="text-sm text-gray-500 mt-1">Faça login para acessar seus projetos</p>
            </div>

            <!-- Form -->
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5" for="username">Usuário</label>
                    <input id="username" type="text" name="username" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400"
                        placeholder="Seu nome de usuário">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5" for="password">Senha</label>
                    <input id="password" type="password" name="password" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full text-white font-semibold py-2.5 rounded-lg text-sm transition-opacity hover:opacity-90 flex items-center justify-center gap-2" style="background-color:#1A3A52">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                    </svg>
                    Entrar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<h1>Reports</h1>
<a href="{{ url_for('reports.create', project_id=project_id) }}">New Report</a>
<ul>
{% for report in reports %}
    <li><a href="{{ url_for('reports.detail', report_id=report.id) }}">{{ report.title }}</a> - {{ report.report_type }}</li>
{% else %}
    <li>No reports yet.</li>
{% endfor %}
</ul>
{% endblock %}

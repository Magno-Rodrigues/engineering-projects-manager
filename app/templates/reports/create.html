{% extends "base.html" %}
{% block title %}Novo Relatório — Engineering Projects Manager{% endblock %}
{% block content %}
<!-- Breadcrumb -->
<nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
    <a href="{{ url_for('projects.index') }}" class="hover:text-blue-600 transition-colors">Projetos</a>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
    <a href="{{ url_for('reports.index', project_id=project_id) }}" class="hover:text-blue-600 transition-colors">Relatórios</a>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
    <span class="text-gray-800 font-medium">Novo Relatório</span>
</nav>

<div class="max-w-2xl">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Novo Relatório</h1>
        <p class="text-sm text-gray-500 mt-1">Documente o progresso e resultados do projeto</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="title">Título</label>
                <input id="title" type="text" name="title" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400"
                    placeholder="Ex: Relatório de Progresso — Semana 3">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="report_type">Tipo de Relatório</label>
                <select id="report_type" name="report_type"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                    <option value="progress">Progresso</option>
                    <option value="technical">Técnico</option>
                    <option value="final">Final</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="content">Conteúdo</label>
                <textarea id="content" name="content" rows="10"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder-gray-400 resize-y"
                    placeholder="Descreva os detalhes do relatório..."></textarea>
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Criar Relatório
                </button>
                <a href="{{ url_for('reports.index', project_id=project_id) }}"
                    class="px-4 py-2.5 border border-gray-300 hover:border-gray-400 text-gray-600 font-medium rounded-lg text-sm transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
